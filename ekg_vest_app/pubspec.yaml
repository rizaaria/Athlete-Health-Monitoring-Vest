name: ekg_vest_app
description: EKGVest App for Health Monitoring via Bluetooth
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.33.2
  fl_chart: ^0.66.0
  google_fonts: ^6.2.1
  provider: ^6.1.1
  cupertino_icons: ^1.0.2
  csv: ^8.0.0
  path_provider: ^2.1.6
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
